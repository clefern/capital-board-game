<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Magnata - Jogo de tabuleiro online de estratégia financeira. Construa negócios, lucre e use cartas para vencer!">
  <meta name="theme-color" content="#0d1b2a">
  <meta property="og:title" content="Magnata - Jogo de Tabuleiro">
  <meta property="og:description" content="Construa negócios, lucre e use cartas para vencer neste jogo de tabuleiro online!">
  <meta property="og:type" content="website">

  <title>Magnata - Jogo de Tabuleiro</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d1b2a'/><text x='50' y='62' text-anchor='middle' font-size='50' font-family='serif' font-weight='bold' fill='%23F2C94C'>M</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d1b2a'/><text x='50' y='62' text-anchor='middle' font-size='50' font-family='serif' font-weight='bold' fill='%23F2C94C'>M</text></svg>">

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/hud.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/modals.css">
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash" class="splash-screen">
    <div class="splash-content">
      <div class="splash-icon">🏢</div>
      <h1 class="splash-title">MAGNATA</h1>
      <div class="splash-subtitle">Carregando...</div>
      <div class="splash-bar"><div class="splash-bar-fill"></div></div>
    </div>
  </div>

  <!-- Aviso para girar o celular -->
  <div id="rotate-screen">
    <div class="rotate-icon">📱</div>
    <p>Gire o celular para jogar</p>
  </div>

  <div id="app"></div>

  <script src="/socket.io/socket.io.js" defer></script>
  <script type="module" src="js/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
